<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark background -->
  <rect width="64" height="64" rx="12" fill="#0a0a14"/>

  <!-- Glow effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Frog body -->
  <circle cx="32" cy="34" r="14" fill="#1c5c0a" filter="url(#glow)"/>
  <circle cx="32" cy="34" r="14" fill="none" stroke="#39ff14" stroke-width="2"/>

  <!-- Frog highlight -->
  <circle cx="28" cy="30" r="8" fill="#246614" opacity="0.7"/>

  <!-- Eyes (on stalks) -->
  <circle cx="24" cy="22" r="6" fill="#1c5c0a" stroke="#39ff14" stroke-width="1.5"/>
  <circle cx="40" cy="22" r="6" fill="#1c5c0a" stroke="#39ff14" stroke-width="1.5"/>
  <!-- Eye pupils -->
  <circle cx="24" cy="22" r="3" fill="#fff01f" filter="url(#glow)"/>
  <circle cx="40" cy="22" r="3" fill="#fff01f" filter="url(#glow)"/>
  <circle cx="25" cy="22" r="1.5" fill="#000"/>
  <circle cx="41" cy="22" r="1.5" fill="#000"/>

  <!-- Smile -->
  <path d="M26 40 Q32 45 38 40" fill="none" stroke="#39ff14" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Front legs -->
  <line x1="18" y1="34" x2="10" y2="28" stroke="#1c5c0a" stroke-width="3" stroke-linecap="round"/>
  <line x1="46" y1="34" x2="54" y2="28" stroke="#1c5c0a" stroke-width="3" stroke-linecap="round"/>

  <!-- Hind legs -->
  <path d="M22 44 Q14 50 16 58" fill="none" stroke="#1c5c0a" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M42 44 Q50 50 48 58" fill="none" stroke="#1c5c0a" stroke-width="3.5" stroke-linecap="round"/>
</svg>
